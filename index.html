<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum - Vamoz GmbH i.Gr.</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0284c7;
            --border: #e2e8f0;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .content {
            font-size: 16px;
            color: var(--text-main);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Impressum</h1>

        <div class="section">
            <div class="label">Anbieter</div>
            <div class="content">
                <strong>Vamoz GmbH i.Gr.</strong><br>
                Siemensstraße 7<br>
                73037 Göppingen
            </div>
        </div>

        <div class="section">
            <div class="label">Gründungsgesellschafter</div>
            <div class="content">Stefanie Kremer</div>
            <div class="content">Petar Djokic</div>
        </div>

        <div class="section">
            <div class="label">Vertreten durch</div>
            <div class="content">Stefanie Kremer (Geschäftsführerin)</div>
            <div class="content">Petar Djokic (Geschäftsführer)</div>
        </div>

        <div class="section">
            <div class="label">Kontakt</div>
            <div class="content">
                Mail: <a href="mailto:info@vamoz-solutions.com">info@vamoz-solutions.com</a><br>
                Mobil: <a href="tel:+491735343454">+49 173 5343454</a>
            </div>
        </div>
    </div>

</body>
</html>
